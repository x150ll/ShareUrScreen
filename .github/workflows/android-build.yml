name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  NDK_VERSION:  '26.1.10909125'
  GRADLE_VERSION: '8.6'

jobs:
  # ─── مرحلة 1: TypeScript Check ─────────────────────────
  lint:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: TypeScript Check
        run: npx tsc --noEmit

  # ─── مرحلة 2: Build APK ────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ── الخطوة الأولى الحرجة: إعداد Gradle ──────────────
      # نثبت Gradle مباشرة ثم نولّد wrapper بدلاً من الاعتماد على jar موجود
      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate Gradle Wrapper
        run: |
          # نولّد gradle wrapper في مجلد android
          chmod +x android/gradlew 2>/dev/null || true
          JAR="android/gradle/wrapper/gradle-wrapper.jar"
          SIZE=$(wc -c < "$JAR" 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 10000 ]; then
            echo "توليد gradle-wrapper.jar باستخدام Gradle المثبت..."
            cd android
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}
            cd ..
          fi
          echo "gradle-wrapper.jar: $(wc -c < $JAR) bytes"

      - name: Install Node dependencies
        run: npm install

      # ── google-services.json ──────────────────────────────
      - name: Setup google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES" ]; then
            echo "$GOOGLE_SERVICES" > android/app/google-services.json
            echo "✅ من GitHub Secret"
          elif [ -f "android/app/google-services.json" ]; then
            echo "✅ موجود في الـ repo"
          else
            echo "❌ google-services.json مفقود"
            exit 1
          fi
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}

      # ── NDK لـ react-native-webrtc ──────────────────────
      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" \
            >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m'
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          [ -f "$APK" ] && echo "✅ APK: $(du -h $APK | cut -f1)" || (echo "❌ APK مفقود" && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShareUrScreen-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
